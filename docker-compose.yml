x-repo-sync-service-environment: &repo-sync-service-environment
  SERVICE_NAME: repo-sync-service
  LOG_LEVEL: info
  KAFKA_BROKERS: kafka:9092
  KAFKA_EVENTS_TOPIC: repo-sync.repo-events
  SNAPSHOT_STORE_HOST: snapshot-store
  SNAPSHOT_STORE_PORT: "5432"
  SNAPSHOT_STORE_DB: snapshot_store
  SNAPSHOT_STORE_USER: postgres
  SNAPSHOT_STORE_PASSWORD: postgres
  SNAPSHOT_STORE_SSLMODE: disable
  S3_ENDPOINT: minio:9000
  S3_REGION: us-east-1
  S3_BUCKET: repo-sync
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin
  S3_USE_SSL: "false"

x-chunking-service-environment: &chunking-service-environment
  SERVICE_NAME: chunking-service
  KAFKA_BROKERS: kafka:9092
  KAFKA_SNAPSHOTS_TOPIC: snapshot.created
  KAFKA_INDEXING_TOPIC: chunking.chunk-indexing-events
  SNAPSHOT_STORE_HOST: snapshot-store
  SNAPSHOT_STORE_PORT: "5432"
  SNAPSHOT_STORE_DB: snapshot_store
  SNAPSHOT_STORE_USER: postgres
  SNAPSHOT_STORE_PASSWORD: postgres
  SNAPSHOT_STORE_SSLMODE: disable
  S3_ENDPOINT: minio:9000
  S3_REGION: us-east-1
  S3_BUCKET: repo-sync
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin
  S3_USE_SSL: "false"

x-indexing-service-environment: &indexing-service-environment
  SERVICE_NAME: indexing-service
  KAFKA_BROKERS: kafka:9092
  KAFKA_INDEXING_TOPIC: chunking.chunk-indexing-events
  SNAPSHOT_STORE_HOST: snapshot-store
  SNAPSHOT_STORE_PORT: "5432"
  SNAPSHOT_STORE_DB: snapshot_store
  SNAPSHOT_STORE_USER: postgres
  SNAPSHOT_STORE_PASSWORD: postgres
  SNAPSHOT_STORE_SSLMODE: disable
  ELASTICSEARCH_URL: http://elasticsearch:9200
  PINECONE_HOST: http://pinecone-local:5080
  PINECONE_API_KEY: pclocal
  PINECONE_INDEX: tessa-chunks
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: password

x-repo-sync-service-common: &repo-sync-service-common
  image: repo-sync-service:local
  build:
    context: ./services
    dockerfile: repo-sync-service/Dockerfile
  depends_on:
    kafka:
      condition: service_healthy
    minio:
      condition: service_started
    minio-init:
      condition: service_completed_successfully
  environment: *repo-sync-service-environment
  networks:
    - tessa-net

x-chunking-service-common: &chunking-service-common
  image: chunking-service:local
  build:
    context: ./services
    dockerfile: chunking-service/Dockerfile
  depends_on:
    kafka:
      condition: service_healthy
    minio:
      condition: service_started
    minio-init:
      condition: service_completed_successfully
    snapshot-store:
      condition: service_healthy
  environment: *chunking-service-environment
  networks:
    - tessa-net

x-indexing-service-common: &indexing-service-common
  image: indexing-service:local
  build:
    context: ./services
    dockerfile: indexing-service/Dockerfile
  depends_on:
    kafka:
      condition: service_healthy
    snapshot-store:
      condition: service_healthy
    elasticsearch:
      condition: service_healthy
    neo4j:
      condition: service_healthy
    pinecone-local:
      condition: service_started
  environment: *indexing-service-environment
  networks:
    - tessa-net

services:
  kafka:
    image: apache/kafka:3.7.2
    container_name: tessa-kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "19092:19092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tessa-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: tessa-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - tessa-net

  minio:
    image: minio/minio:latest
    container_name: tessa-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    networks:
      - tessa-net

  minio-init:
    image: minio/mc:latest
    container_name: tessa-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done &&
      mc mb --ignore-existing local/repo-sync &&
      mc anonymous set private local/repo-sync
      "
    restart: "no"
    networks:
      - tessa-net

  snapshot-store:
    image: postgres:16-alpine
    container_name: snapshot-store
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: snapshot_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - snapshot-store-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d snapshot_store"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tessa-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: tessa-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - tessa-net

  neo4j:
    image: neo4j:5-community
    container_name: tessa-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - tessa-net

  pinecone-local:
    image: ghcr.io/pinecone-io/pinecone-local:latest
    container_name: tessa-pinecone-local
    platform: linux/amd64
    environment:
      PORT: 5080
      PINECONE_HOST: pinecone-local
    ports:
      - "5080-5090:5080-5090"
    networks:
      - tessa-net

  repo-sync-service-api:
    <<: *repo-sync-service-common
    container_name: repo-sync-service-api
    environment:
      <<: *repo-sync-service-environment
      PORT: 8081
    ports:
      - "8081:8081"

  repo-sync-service-consumer:
    <<: *repo-sync-service-common
    container_name: repo-sync-service-consumer
    command: ["repo-sync-service-consumer"]

  chunking-service:
    <<: *chunking-service-common
    container_name: chunking-service
    command: ["chunking-service-consumer"]
    environment:
      <<: *chunking-service-environment
      SERVICE_NAME: chunking-service

  indexing-service:
    <<: *indexing-service-common
    container_name: indexing-service
    command: ["indexing-service-consumer"]
    environment:
      <<: *indexing-service-environment
      SERVICE_NAME: indexing-service

networks:
  tessa-net:
    driver: bridge

volumes:
  kafka-data:
  minio-data:
  snapshot-store-data:
  elasticsearch-data:
  neo4j-data:
  neo4j-logs:
